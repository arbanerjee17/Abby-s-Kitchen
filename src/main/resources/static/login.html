<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Login / Register</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#1e1e2f,#2c3e50);
    color:white;
}

/* Hamburger */
.menu-btn {
    font-size:28px;
    cursor:pointer;
    position:fixed;
    top:20px;
    left:20px;
    z-index:1001;
}

/* Logout Button */
.logout-btn {
    position:fixed;
    top:20px;
    right:20px;
    padding:8px 18px;
    border:none;
    background:#ff4b7d;
    color:white;
    border-radius:20px;
    cursor:pointer;
    font-size:14px;
    z-index:1001;
}

.logout-btn:hover {
    background:#ff2f65;
}

/* Sidebar */
.sidenav {
    height:100%;
    width:0;
    position:fixed;
    top:0;
    left:0;
    background:#111;
    overflow-x:hidden;
    transition:0.4s;
    padding-top:60px;
    z-index:1000;
}

.sidenav a {
    padding:15px 25px;
    text-decoration:none;
    font-size:18px;
    color:white;
    display:block;
}

.sidenav a:hover {
    background:#ff4b7d;
}

.close-btn {
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}

/* Wrapper */
.login-wrapper {
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:100px 20px 40px 20px;
}

/* Card */
.login-container {
    background:rgba(255,255,255,0.08);
    padding:40px;
    border-radius:20px;
    width:100%;
    max-width:500px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.login-container h2 {
    margin-bottom:20px;
}

.login-container a {
    color:white;
    font-size:14px;
}

/* Inputs */
input {
    width:100%;
    padding:12px;
    margin:12px 0;
    border:none;
    border-radius:10px;
    font-size:14px;
}

/* Button */
.login-btn {
    width:100%;
    padding:14px;
    border:none;
    background:linear-gradient(to right,#ff416c,#ff4b2b);
    color:white;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    margin-top:15px;
    transition:0.3s;
}

.login-btn:hover {
    transform:scale(1.05);
}

/* ✅ MOBILE FIX */
@media (max-width: 768px) {

    .login-wrapper {
        padding:90px 15px 30px 15px;
        align-items:flex-start;
    }

    .login-container {
        padding:25px;
    }

    .logout-btn {
        right:15px;
        padding:6px 14px;
        font-size:12px;
    }

    .menu-btn {
        left:15px;
    }
}
</style>
</head>

<body>

<!-- Hamburger -->
<span class="menu-btn" onclick="openNav()">☰</span>

<!-- Logout Button -->
<button class="logout-btn" id="logoutBtn" onclick="logoutUser()">
    🚪 Logout
</button>

<!-- Sidebar -->
<div id="mySidenav" class="sidenav">
    <span class="close-btn" onclick="closeNav()">&times;</span>
    <a href="index.html">🏠 Home</a>
    <a href="login.html">🔐 Login / Register</a>
    <a href="menu.html">🍽 Menu</a>
    <a href="orders.html">📦 Order History</a>
    <a href="reviews.html">⭐ Reviews</a>
</div>

<!-- Login Box -->
<div class="login-wrapper">
    <div class="login-container">
        <h2>Login</h2>
        <a href="register.html">Register</a>

        <input type="email" id="email" placeholder="Enter Email">
        <input type="password" id="password" placeholder="Enter Password">

        <button class="login-btn" onclick="loginUser()">
            Login
        </button>
    </div>
</div>

<script>

function openNav() {
    document.getElementById("mySidenav").style.width = "250px";
}

function closeNav() {
    document.getElementById("mySidenav").style.width = "0";
}

function loginUser() {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    fetch("/customer/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    })
    .then(response => {
        if(response.ok) {

            localStorage.setItem("userEmail", email);
            localStorage.setItem("isLoggedIn", "true");

            alert("Login Successful!");

            const redirectPage = localStorage.getItem("redirectAfterLogin");

            if(redirectPage) {
                localStorage.removeItem("redirectAfterLogin");
                window.location.href = redirectPage;
            } else {
                window.location.href = "menu.html";
            }

        } else {
            alert("Invalid Credentials!");
        }
    })
    .catch(error => {
        alert("Login Error!");
        console.log(error);
    });
}

function logoutUser() {

    localStorage.clear();

    alert("Logged out successfully!");
    window.location.href = "index.html";
}

window.onload = function() {

    const isLoggedIn = localStorage.getItem("isLoggedIn");

    if(isLoggedIn !== "true") {
        document.getElementById("logoutBtn").style.display = "none";
    }
}

</script>

</body>
</html>
