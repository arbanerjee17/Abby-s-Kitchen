<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Our Menu</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1f2235,#2f3e50);
    color: white;
}

/* Hamburger */
.menu-btn {
    font-size: 28px;
    cursor: pointer;
    position: fixed;
    top: 20px;
    left: 25px;
    z-index: 1001;
}

/* Sidebar */
.sidenav {
    height: 100%;
    width: 0;
    position: fixed;
    top: 0;
    left: 0;
    background: #111;
    overflow-x: hidden;
    transition: 0.4s;
    padding-top: 60px;
    z-index: 1000;
}

.sidenav a {
    padding: 15px 25px;
    text-decoration: none;
    font-size: 18px;
    color: white;
    display: block;
}

.sidenav a:hover {
    background-color: #ff4b7d;
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
}

/* Cart Button */
.cart-btn {
    position: fixed;
    top: 20px;
    right: 30px;
    padding: 10px 25px;
    background: #ff416c;
    color: white;
    border: none;
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
}

/* Title */
h1 {
    text-align: center;
    padding-top: 100px;
    font-size: 42px;
    margin-bottom: 40px;
}

/* Grid */
.menu-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 40px;
    padding: 0 60px 80px 60px;
}

/* Card */
.card {
    background: #3c4659;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    transition: 0.3s ease;
}

.card:hover {
    transform: translateY(-10px);
}

.card img {
    width: 100%;
    height: 230px;
    object-fit: cover;
}

/* Card Body */
.card-body {
    padding: 30px;
    text-align: center;
}

.card-body h3 {
    font-size: 22px;
    margin-bottom: 20px;
}

.price {
    color: #ff4b7d;
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 25px;
}

.btn {
    padding: 12px 30px;
    border: none;
    background: #ff4b7d;
    color: white;
    border-radius: 30px;
    font-size: 15px;
    cursor: pointer;
}

.btn:hover {
    background: #ff2f65;
}
</style>
</head>

<body>

<span class="menu-btn" onclick="openNav()">☰</span>

<div id="mySidenav" class="sidenav">
    <span class="close-btn" onclick="closeNav()">&times;</span>
    <a href="index.html">🏠 Home</a>
    <a href="login.html">🔐 Login</a>
    <a href="menu.html">🍽 Menu</a>
    <a href="orders.html">📦 Orders</a>
    <a href="reviews.html">⭐ Reviews</a>
</div>

<button class="cart-btn" onclick="window.location.href='cart.html'">
    View Cart 🛒
</button>

<h1>🍽 Our Delicious Menu</h1>

<div class="menu-container">

    <!-- Farmhouse Pizza -->
    <div class="card">
        <img src="IMAGES/PIZZA.jpg">
        <div class="card-body">
            <h3>🍕 Farmhouse Pizza</h3>
            <p class="price">₹349</p>
            <button class="btn" onclick="addStaticItem('Farmhouse Pizza',349)">
                Add to Cart
            </button>
        </div>
    </div>

    <!-- Double Chicken Burger -->
    <div class="card">
        <img src="IMAGES/BURGER.jpg">
        <div class="card-body">
            <h3>🍔 Double Chicken Burger</h3>
            <p class="price">₹249</p>
            <button class="btn" onclick="addStaticItem('Double Chicken Burger',249)">
                Add to Cart
            </button>
        </div>
    </div>

    <!-- Italian Creamy Pasta -->
    <div class="card">
        <img src="IMAGES/PASTA.jpg">
        <div class="card-body">
            <h3>🍝 Italian Creamy Pasta</h3>
            <p class="price">₹279</p>
            <button class="btn" onclick="addStaticItem('Italian Creamy Pasta',279)">
                Add to Cart
            </button>
        </div>
    </div>

    <!-- Cheese Pizza -->
    <div class="card">
        <img src="IMAGES/PIZZA2.jpg">
        <div class="card-body">
            <h3>🧀 Cheese Pizza</h3>
            <p class="price">₹299</p>
            <button class="btn" onclick="addStaticItem('Cheese Pizza',299)">
                Add to Cart
            </button>
        </div>
    </div>

</div>

<script>

function openNav() {
    document.getElementById("mySidenav").style.width = "250px";
}

function closeNav() {
    document.getElementById("mySidenav").style.width = "0";
}

function addStaticItem(name, price) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existing = cart.find(item => item.name === name);

    if(existing){
        existing.quantity += 1;
    } else {
        cart.push({name:name, price:price, quantity:1});
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    alert(name + " added to cart!");
}

</script>

</body>
</html>
