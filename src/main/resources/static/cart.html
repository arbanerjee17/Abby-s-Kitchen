<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Cart</title>

<style>
body {
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(to right, #ff9966, #ff5e62);
    margin: 0;
    padding: 0;
}

/* Hamburger Button */
.menu-btn {
    font-size: 28px;
    cursor: pointer;
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1001;
    color: white;
}

/* Side Navigation */
.sidenav {
    height: 100%;
    width: 0;
    position: fixed;
    top: 0;
    left: 0;
    background-color: #111;
    overflow-x: hidden;
    transition: 0.4s;
    padding-top: 60px;
    z-index: 1000;
}

.sidenav a {
    padding: 15px 25px;
    text-decoration: none;
    font-size: 18px;
    color: white;
    display: block;
}

.sidenav a:hover {
    background-color: #ff4b7d;
}

.sidenav .close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
}

/* Main Container */
.cart-container {
    max-width: 900px;
    margin: auto;
    padding: 100px 20px 40px 20px;
}

h1 {
    text-align:center;
    color:white;
    margin-bottom: 30px;
}

/* Cart Item */
.item {
    background:white;
    padding:20px;
    margin:15px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-radius:12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    flex-wrap: wrap;
}

.item span {
    font-weight: 600;
}

.item div {
    display:flex;
    gap:10px;
}

/* Buttons */
button {
    padding:6px 12px;
    border:none;
    background:#ff4b7d;
    color:white;
    cursor:pointer;
    border-radius:6px;
}

button:hover {
    opacity:0.9;
}

/* Total */
#total {
    text-align:center;
    color:white;
    margin-top: 30px;
    font-size: 22px;
}

/* Checkout Button */
.checkout-btn {
    display:block;
    margin: 30px auto;
    padding: 12px 30px;
    font-size:16px;
    background:#111;
    border-radius:30px;
}

/* Empty message */
.empty {
    text-align:center;
    color:white;
    font-size:18px;
    margin-top:40px;
}

/* ✅ MOBILE FIX */
@media (max-width: 768px) {

    .cart-container {
        padding: 90px 15px 30px 15px;
    }

    h1 {
        font-size: 26px;
    }

    .item {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
    }

    .item div {
        width: 100%;
        justify-content: space-between;
    }

    button {
        flex: 1;
    }

    .checkout-btn {
        width: 100%;
    }
}
</style>
</head>

<body>

<span class="menu-btn" onclick="openNav()">☰</span>

<div id="mySidenav" class="sidenav">
    <span class="close-btn" onclick="closeNav()">&times;</span>
    <a href="index.html">🏠 Home</a>
    <a href="login.html">🔐 Login / Register</a>
    <a href="menu.html">🍽 Menu</a>
    <a href="orders.html">📦 Order History</a>
    <a href="reviews.html">⭐ Reviews</a>
</div>

<div class="cart-container">

<h1>Your Cart 🛒</h1>

<div id="cart"></div>

<h2 id="total"></h2>

<button class="checkout-btn" onclick="proceedToCheckout()">
    Proceed to Checkout
</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let cartDiv = document.getElementById("cart");
let total = 0;

function increase(index) {
    cart[index].quantity += 1;
    localStorage.setItem("cart", JSON.stringify(cart));
    location.reload();
}

function decrease(index) {
    if(cart[index].quantity > 1){
        cart[index].quantity -= 1;
    } else {
        cart.splice(index,1);
    }
    localStorage.setItem("cart", JSON.stringify(cart));
    location.reload();
}

function openNav() {
    document.getElementById("mySidenav").style.width = "250px";
}

function closeNav() {
    document.getElementById("mySidenav").style.width = "0";
}

function proceedToCheckout() {

    const isLoggedIn = localStorage.getItem("isLoggedIn");

    if(isLoggedIn !== "true") {

        alert("Please login / register to place order.");
        localStorage.setItem("redirectAfterLogin", "checkout.html");
        window.location.href = "login.html";

    } else {
        window.location.href = "checkout.html";
    }
}

/* Render Cart */
if(cart.length === 0){
    cartDiv.innerHTML = `<div class="empty">Your cart is empty 😔</div>`;
} else {

    cart.forEach((item,index) => {

        total += item.price * item.quantity;

        cartDiv.innerHTML += `
            <div class="item">
                <span>
                    ${item.name} - ₹${item.price} × ${item.quantity}
                </span>
                <div>
                    <button onclick="decrease(${index})">-</button>
                    <button onclick="increase(${index})">+</button>
                </div>
            </div>
        `;
    });

    document.getElementById("total").innerText = "Total: ₹" + total;
}

</script>

</body>
</html>
