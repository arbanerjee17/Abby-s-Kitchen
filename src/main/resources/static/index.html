<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Abby's Kitchen</title>
<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(to right,#ff416c,#ff4b2b);
    color:white;
    overflow:hidden;
}

/* Hamburger Button */
.menu-btn {
    font-size: 28px;
    cursor: pointer;
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1001;
    color: white;
}

/* Side Navigation */
.sidenav {
    height: 100%;
    width: 0;
    position: fixed;
    top: 0;
    left: 0;
    background-color: #111;
    overflow-x: hidden;
    transition: 0.4s;
    padding-top: 60px;
    z-index: 1000;
}

.sidenav a {
    padding: 15px 25px;
    text-decoration: none;
    font-size: 18px;
    color: white;
    display: block;
    transition: 0.3s;
}

.sidenav a:hover {
    background-color: #ff4b7d;
}

.sidenav .close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
}

.navbar {
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar a {
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:bold;
}

.hero {
    height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    animation: fadeIn 1.5s ease;
}

.hero h1 {
    font-size:60px;
    margin:0;
}

.hero p {
    font-size:20px;
    margin:20px 0;
}

.hero button {
    padding:15px 30px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff416c;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.hero button:hover {
    transform:scale(1.1);
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>
<span class="menu-btn" onclick="openNav()">☰</span>

<div id="mySidenav" class="sidenav">
    <span class="close-btn" onclick="closeNav()">&times;</span>

    <a href="index.html">🏠 Home</a>
    <a href="login.html">🔐 Login / Register</a>
    <a href="menu.html">🍽 Menu</a>
    <a href="orders.html">📦 Order History</a>
    <a href="reviews.html">⭐ Reviews</a>
</div>

<div class="navbar">
    <h2>🍽 Abby's</h2>
    <div>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </div>
</div>

<div class="hero">
    <h1>
    Welcome to <span style="color:#000000;">Abby's Kitchen</span>
    </h1>
    <h2>Delicious Food Delivered</h2>
    <p>Fresh • Tasty • Fast</p>
    <button onclick="window.location.href='menu.html'">Explore Menu</button>
</div>
<script>

function openNav() {
    document.getElementById("mySidenav").style.width = "250px";
}

function closeNav() {
    document.getElementById("mySidenav").style.width = "0";
}

</script>

</body>

</html>
