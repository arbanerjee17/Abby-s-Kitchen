<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
}

.navbar {
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    background:rgba(0,0,0,0.3);
}

.navbar button {
    padding:8px 20px;
    border:none;
    border-radius:20px;
    background:#ff416c;
    color:white;
    cursor:pointer;
}

.content {
    text-align:center;
    margin-top:100px;
    animation:fadeUp 1s ease;
}

.content h1 {
    font-size:45px;
}

.content button {
    margin-top:30px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    background:white;
    color:#2a5298;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.content button:hover {
    transform:scale(1.1);
}

@keyframes fadeUp {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>

<div class="navbar">
    <h2>🍽 Dashboard</h2>
    <button onclick="logout()">Logout</button>
</div>

<div class="content">
    <h1>Welcome Back 👋</h1>
    <p>Ready to order something delicious?</p>
    <button onclick="window.location.href='menu.html'">View Menu</button>
</div>

<script>
function logout() {
    window.location.href="login.html";
}
</script>

</body>
</html>
