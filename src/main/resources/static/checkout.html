<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Checkout</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff9966, #ff5e62);
    margin: 0;
    padding: 0;
}

/* Hamburger Button */
.menu-btn {
    font-size: 28px;
    cursor: pointer;
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1001;
    color: white;
}

/* Side Navigation */
.sidenav {
    height: 100%;
    width: 0;
    position: fixed;
    top: 0;
    left: 0;
    background-color: #111;
    overflow-x: hidden;
    transition: 0.4s;
    padding-top: 60px;
    z-index: 1000;
}

.sidenav a {
    padding: 15px 25px;
    text-decoration: none;
    font-size: 18px;
    color: white;
    display: block;
}

.sidenav a:hover {
    background-color: #ff4b7d;
}

.sidenav .close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
}

/* Page Wrapper */
.page-wrapper {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 100px 20px 40px 20px;
}

/* Checkout Card */
.checkout-card {
    background: white;
    width: 100%;
    max-width: 600px;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 25px;
}

/* Bill Rows */
.bill-row {
    display: flex;
    justify-content: space-between;
    margin: 12px 0;
    font-size: 16px;
}

.total {
    font-size: 18px;
    font-weight: bold;
    border-top: 2px solid #ddd;
    padding-top: 12px;
    margin-top: 15px;
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    margin-top: 25px;
    border: none;
    border-radius: 8px;
    background: #ff5e62;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #ff3b3f;
}

/* Empty Cart */
.empty {
    text-align: center;
    margin-top: 20px;
    font-size: 16px;
}

/* ✅ MOBILE FIX */
@media (max-width: 768px) {

    .page-wrapper {
        padding: 90px 15px 30px 15px;
        align-items: flex-start;
    }

    .checkout-card {
        padding: 20px;
    }

    h2 {
        font-size: 22px;
    }

    .bill-row {
        font-size: 14px;
    }

    button {
        padding: 12px;
        font-size: 15px;
    }
}
</style>
</head>

<body>

<span class="menu-btn" onclick="openNav()">☰</span>

<div id="mySidenav" class="sidenav">
    <span class="close-btn" onclick="closeNav()">&times;</span>
    <a href="index.html">🏠 Home</a>
    <a href="login.html">🔐 Login / Register</a>
    <a href="menu.html">🍽 Menu</a>
    <a href="orders.html">📦 Order History</a>
    <a href="reviews.html">⭐ Reviews</a>
</div>

<div class="page-wrapper">
<div class="checkout-card">

<h2>Checkout 🧾</h2>

<div id="bill"></div>

<button onclick="placeOrder()">Place Order</button>

</div>
</div>

<script>

// Block direct access
window.onload = function() {

    const isLoggedIn = localStorage.getItem("isLoggedIn");

    if(isLoggedIn !== "true") {
        alert("You must login first!");
        localStorage.setItem("redirectAfterLogin", "checkout.html");
        window.location.href = "login.html";
    }
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let userEmail = localStorage.getItem("userEmail");

if(cart.length === 0){
    document.getElementById("bill").innerHTML =
        `<div class="empty">Your cart is empty 😔</div>`;
}

if(!userEmail){
    alert("Please login first!");
    window.location.href = "login.html";
}

let subtotal = 0;
cart.forEach(item => {
    subtotal += item.price * item.quantity;
});

let gst = subtotal * 0.18;
let delivery = 40;
let total = subtotal + gst + delivery;

if(cart.length !== 0){
document.getElementById("bill").innerHTML = `
    <div class="bill-row">
        <span>Subtotal</span>
        <span>₹${subtotal}</span>
    </div>
    <div class="bill-row">
        <span>GST (18%)</span>
        <span>₹${gst.toFixed(2)}</span>
    </div>
    <div class="bill-row">
        <span>Delivery Charge</span>
        <span>₹${delivery}</span>
    </div>
    <div class="bill-row total">
        <span>Total</span>
        <span>₹${total.toFixed(2)}</span>
    </div>
`;
}

function openNav() {
    document.getElementById("mySidenav").style.width = "250px";
}

function closeNav() {
    document.getElementById("mySidenav").style.width = "0";
}

function placeOrder(){

    fetch("https://abby-s-kitchen.onrender.com/orders/place", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            amount: subtotal,
            gst: gst,
            deliveryCharge: delivery,
            totalAmount: total,
            customerEmail: userEmail
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("Order Placed Successfully!");
        localStorage.removeItem("cart");
        window.location.href = "orders.html";
    });

}

</script>

</body>
</html>
